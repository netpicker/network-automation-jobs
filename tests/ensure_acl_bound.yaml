x-common-cli: &common-cli
  show running-config interface iface: ok
  interface iface: ok
  ip access-group acl1 in: ok


tests:
  - name: Happy flow
    device:
      platform: cisco_ios
    outcome: OK
    variables:
      interface: iface
      acl_name: acl1
    cli:
      <<: *common-cli
      write memory:  ok

  - name: NX-OS flow
    device:
      platform: cisco_nxos
    outcome: OK
    variables:
      interface: iface
      acl_name: acl1
    cli:
      <<: *common-cli
      write memory: ok
